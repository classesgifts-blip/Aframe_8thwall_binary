<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>09 — Multi Image Targets</title>

  <!-- AR Libraries -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <!-- 8th Wall Engine -->
  <script async src="../engine/xr.js" data-preload-chunks="slam"></script>

  <!-- Image Target Configuration — MULTIPLE TARGETS
       Each target needs a unique "name" and its own image file.
       Adjust width/height properties to match each image's dimensions. -->
  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData: [
          {
            "name": "poster-a",
            "type": "PLANAR",
            "imagePath": "../assets/Target_1000055040bw-resize-640x480.jpg",
            "properties": {
              "left": 0, "top": 0,
              "width": 480, "height": 640,
              "originalWidth": 480, "originalHeight": 640,
              "isRotated": false
            }
          },
          {
            "name": "poster-b",
            "type": "PLANAR",
            "imagePath": "../assets/Target_cat_640.jpg",
            "properties": {
              "left": 0, "top": 0,
              "width": 480, "height": 646,
              "originalWidth": 480, "originalHeight": 640,
              "isRotated": false
            }
          },
          {
            "name": "poster-c",
            "type": "PLANAR",
            "imagePath": "../assets/Target_snowflakes_640.jpg",
            "properties": {
              "left": 0, "top": 0,
              "width": 478, "height": 640,
              "originalWidth": 480, "originalHeight": 640,
              "isRotated": false
            }
          },
          {
            "name": "poster-d",
            "type": "PLANAR",
            "imagePath": "../assets/Target_dragonfly_640_640.jpg",
            "properties": {
              "left": 0, "top": 0,
              "width": 640, "height": 640,
              "originalWidth": 640, "originalHeight": 640,
              "isRotated": false
            }
          }
        ]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>
</head>
<body>
  <a-scene
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">

    <a-camera position="0 4 10"></a-camera>

    <!-- TARGET A — each target gets its own <xrextras-named-image-target>
         with a name matching the imageTargetData entry -->
    <xrextras-named-image-target name="poster-a">
      <a-box color="#FF0055" position="0 0.5 0"
             animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
      </a-box>
      <a-text value="Target A" color="white" align="center"
              position="0 1.5 0" width="3"></a-text>
    </xrextras-named-image-target>

    <!-- TARGET B — different AR content for the second image
         Replace ../assets/target-b.jpg with your own second image target -->
    <xrextras-named-image-target name="poster-b">
      <a-sphere color="#00AAFF" position="0 0.5 0" radius="0.4"
                animation="property: position; from: 0 0.5 0; to: 0 1.0 0;
                           loop: true; dur: 1500; dir: alternate; easing: easeInOutQuad">
      </a-sphere>
      <a-text value="Target B" color="white" align="center"
              position="0 1.5 0" width="3"></a-text>
    </xrextras-named-image-target>

    <!-- TARGET C — different AR content for the second image
    Replace ../assets/target-b.jpg with your own second image target -->
    <xrextras-named-image-target name="poster-c">
      <a-sphere color="#FFAAFF" position="0 0.5 0" radius="0.4"
                animation="property: position; from: 0 0.5 0; to: 0 1.0 0;
                               loop: true; dur: 1500; dir: alternate; easing: easeInOutQuad">
      </a-sphere>
      <a-text value="Target C" color="white" align="center"
                  position="0 1.5 0" width="3"></a-text>
      </xrextras-named-image-target>

    <!-- TARGET D — different AR content for the second image
    Replace ../assets/target-b.jpg with your own second image target -->
    <xrextras-named-image-target name="poster-d">
      <a-sphere color="#FF00AA" position="0 0.5 0" radius="0.4"
                animation="property: position; from: 0 0.5 0; to: 0 1.0 0;
                               loop: true; dur: 1500; dir: alternate; easing: easeInOutQuad">
      </a-sphere>
      <a-text value="Target D" color="white" align="center"
                  position="0 1.5 0" width="3"></a-text>
      </xrextras-named-image-target>

  </a-scene>
</body>
</html>
