<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>08 — Gaussian Splat</title>

  <!-- AR Libraries -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <!-- 8th Wall Engine -->
  <script async src="../engine/xr.js" data-preload-chunks="slam"></script>

  <!-- Image Target Configuration -->
  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData:[{
          "name": "my-poster",
          "type": "PLANAR",
          "imagePath": "../assets/Target_1000055040bw-resize-640x480.jpg",
          "properties": {
            "left": 0, "top": 0,
            "width": 480, "height": 640,
            "originalWidth": 480, "originalHeight": 640,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <!-- Custom component: loads a Gaussian Splat via spark.js.
       Spark.js is a 3DGS renderer for THREE.js that supports
       .sog, .splat, .ply, .spz, and .ksplat file formats.
       It is loaded as an ES module via dynamic import(). -->
  <script>
    AFRAME.registerComponent('spark-splat', {
      schema: {
        src: {type: 'string'}
      },
      init: async function () {
        try {
          var Spark = await import('https://cdn.jsdelivr.net/npm/@sparkjsdev/spark/+esm');
          this.splat = new Spark.SplatMesh({url: this.data.src});
          this.el.object3D.add(this.splat);
        } catch (err) {
          console.error('Failed to load Gaussian splat:', err);
        }
      },
      remove: function () {
        if (this.splat) {
          this.el.object3D.remove(this.splat);
          this.splat.dispose();
        }
      }
    });
  </script>
</head>
<body>
  <a-scene
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="my-poster">

      <!-- Gaussian Splat — replace src with your own .sog / .splat / .ply file
           Scale is critical: splat scenes are often real-world scale
           and need significant scaling down to fit on an image target -->
      <a-entity spark-splat="src: ../assets/splat_30000.sog"
                position="0 0.5 0"
                scale="0.3 0.3 0.3">
      </a-entity>

    </xrextras-named-image-target>

  </a-scene>
</body>
</html>
